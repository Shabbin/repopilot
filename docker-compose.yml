version: "3.9"

services:
  db:
    image: postgres:16
    container_name: repopilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: repopilot
      POSTGRES_PASSWORD: repopilot
      POSTGRES_DB: repopilot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: